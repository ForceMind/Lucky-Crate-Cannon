<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Lucky Crate Cannon</title>
<link rel="icon" href="favicon.png" type="image/png" />
<style>
  * { box-sizing: border-box; user-select: none; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #15213a; font-family: Arial, "Microsoft YaHei", sans-serif;
  }
  #game {
    display: block; width: 100vw; height: 100vh;
    background: radial-gradient(circle at 50% 85%, #334b7a 0%, #17243d 45%, #0b1020 100%);
  }
  .hint {
    position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
    color: rgba(255,255,255,.78); font-size: 13px; pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,.5);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hint"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
